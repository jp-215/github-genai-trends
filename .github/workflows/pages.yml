name: Publish Web UI

on:
  schedule:
    - cron: "22 15 * * *"   # ~08:22 PT, just after the alert
  workflow_dispatch: {}
  push:
    branches: ["main", "master"]
    paths: ["web/**", "gh_trends/**", ".github/workflows/pages.yml"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate trend data (read-only; does not touch the seen-set)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m gh_trends.cli --no-seen --json web/data.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@v4
